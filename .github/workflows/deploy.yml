name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - run: bun run build
        env:
          NITRO_PRESET: github-pages

      - name: Find and prepare output
        run: |
          # Nitro github-pages preset outputs to .output/public
          if [ -d ".output/public" ]; then
            OUTPUT_DIR=".output/public"
          else
            OUTPUT_DIR="dist/client"
          fi
          echo "OUTPUT_DIR=$OUTPUT_DIR" >> "$GITHUB_ENV"
          cp "$OUTPUT_DIR/index.html" "$OUTPUT_DIR/404.html" 2>/dev/null || true
          echo "transatlantic-talent-bridge.com" > "$OUTPUT_DIR/CNAME"
          touch "$OUTPUT_DIR/.nojekyll"
          echo "Deploying from: $OUTPUT_DIR"
          ls -la "$OUTPUT_DIR"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.OUTPUT_DIR }}

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
